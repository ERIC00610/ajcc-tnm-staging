<!DOCTYPE html>
<html lang="zh-Hant">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>AJCC TNM 查詢表（8e / 9e 對照）</title>
<style>
  :root{
    --bg:#0f1419; --panel:#161b22; --panel2:#1c232c; --border:#2b3441;
    --txt:#e6edf3; --muted:#8b98a5; --accent:#4493f8;
    --v8:#5b6b7d; --v8bg:#1d2630; --v9:#2ea043; --v9bg:#11271a;
    --chipbg:#21262d; --hl:#fff3b0;
  }
  *{box-sizing:border-box}
  body{margin:0;font-family:-apple-system,"PingFang TC","Segoe UI",Roboto,Helvetica,Arial,sans-serif;
    background:var(--bg);color:var(--txt);line-height:1.5;font-size:15px}
  header{position:sticky;top:0;z-index:20;background:var(--panel);
    border-bottom:1px solid var(--border);padding:14px 18px 10px}
  h1{margin:0 0 2px;font-size:19px;letter-spacing:.3px}
  .sub{color:var(--muted);font-size:12.5px;margin-bottom:10px}
  .controls{display:flex;flex-wrap:wrap;gap:8px;align-items:center}
  #q{flex:1 1 260px;min-width:200px;background:var(--panel2);border:1px solid var(--border);
    color:var(--txt);padding:9px 12px;border-radius:8px;font-size:15px;outline:none}
  #q:focus{border-color:var(--accent)}
  select,.chip{background:var(--chipbg);border:1px solid var(--border);color:var(--txt);
    padding:8px 12px;border-radius:8px;font-size:13.5px;cursor:pointer}
  .chip.active{background:var(--accent);border-color:var(--accent);color:#001321;font-weight:600}
  .count{color:var(--muted);font-size:12.5px;margin:10px 18px 0}
  main{padding:6px 14px 60px;max-width:980px;margin:0 auto}
  .part{margin:18px 0 6px;color:var(--muted);font-size:12px;font-weight:600;
    text-transform:uppercase;letter-spacing:.6px;border-bottom:1px solid var(--border);padding-bottom:4px}
  .card{background:var(--panel);border:1px solid var(--border);border-radius:10px;
    margin:7px 0;overflow:hidden}
  .row{display:flex;align-items:center;gap:10px;padding:11px 14px;cursor:pointer;user-select:none}
  .row:hover{background:var(--panel2)}
  .ch{color:var(--muted);font-size:12px;font-variant-numeric:tabular-nums;min-width:24px;text-align:right}
  .name{flex:1;min-width:0}
  .name .en{font-weight:600}
  .name .zh{color:var(--muted);font-size:12.5px}
  .badge{font-size:11.5px;font-weight:700;padding:3px 9px;border-radius:20px;white-space:nowrap}
  .b8{color:#c3d3e3;background:var(--v8bg);border:1px solid var(--v8)}
  .b9{color:#7ee2a0;background:var(--v9bg);border:1px solid var(--v9)}
  .hasdetail{font-size:11px;color:var(--v9);margin-left:2px}
  .nodetail{font-size:11px;color:#6b7682;margin-left:2px}
  .arrow{color:var(--muted);transition:transform .15s;font-size:12px}
  .open .arrow{transform:rotate(90deg)}
  .detail{display:none;padding:4px 16px 16px;border-top:1px solid var(--border);background:var(--panel2)}
  .open .detail{display:block}
  .detail h4{margin:14px 0 6px;font-size:13px;color:var(--accent);letter-spacing:.4px}
  .detail table{width:100%;border-collapse:collapse;font-size:13px;margin-top:2px}
  .detail td{border:1px solid var(--border);padding:6px 9px;vertical-align:top}
  .detail td.k{white-space:nowrap;font-weight:700;color:#9fd0ff;width:1%;font-variant-numeric:tabular-nums}
  .note{margin-top:12px;font-size:12.5px;color:var(--muted);background:#1a1f27;
    border-left:3px solid var(--v8);padding:8px 11px;border-radius:0 6px 6px 0}
  .pending{color:var(--muted);font-size:13px;padding:10px 2px}
  .pending b{color:#c9a227}
  mark{background:var(--hl);color:#000;border-radius:2px;padding:0 1px}
  .disclaimer{background:#2a1f12;border:1px solid #5c4318;color:#e8d5a8;
    font-size:12px;padding:9px 18px;text-align:center}
  .empty{text-align:center;color:var(--muted);padding:40px 0}
  a{color:var(--accent)}
</style>
</head>

<header>
  <h1>AJCC TNM 查詢表</h1>
  <div class="sub">8th Edition 與 Version 9 混用對照 · 資料依 AJCC Current Staging System (2026)</div>
  <div class="controls">
    <input id="q" placeholder="輸入癌症名稱搜尋（中／英），例：lung、乳癌、bone、prostate…" autocomplete="off">
    <div class="chip active" data-ver="all">全部</div>
    <div class="chip" data-ver="8">僅 8e</div>
    <div class="chip" data-ver="9">僅 9e</div>
    <div class="chip" data-detail="1">只看已填 TNM</div>
    <select id="part"><option value="all">所有部位系統</option></select>
  </div>
</header>
<div class="disclaimer">本表 TNM 內容供快速查詢與教學參考，臨床分期決策請對照 AJCC 原書 / UpToDate。標示「TNM 待補」者目前僅提供版本資訊。</div>
<div class="count" id="count"></div>
<main id="list"></main>

/* ---------- 渲染 ---------- */
const listEl=document.getElementById('list');
const countEl=document.getElementById('count');
const qEl=document.getElementById('q');
const partSel=document.getElementById('part');
let fVer="all", fDetail=false;

// 填入部位下拉
[...new Set(DATA.map(d=>d.part))].forEach(p=>{
  const o=document.createElement('option');o.value=p;o.textContent=p;partSel.appendChild(o);
});

function esc(s){return s.replace(/[&<>]/g,c=>({'&':'&amp;','<':'&lt;','>':'&gt;'}[c]));}
function hl(s,q){if(!q)return esc(s);
  const i=s.toLowerCase().indexOf(q.toLowerCase());
  if(i<0)return esc(s);
  return esc(s.slice(0,i))+'<mark>'+esc(s.slice(i,i+q.length))+'</mark>'+esc(s.slice(i+q.length));}

function tbl(title,rows){
  if(!rows||!rows.length)return'';
  let h=`<h4>${title}</h4><table>`;
  rows.forEach(([k,v])=>{h+=`<tr><td class="k">${esc(k)}</td><td>${esc(v)}</td></tr>`;});
  return h+'</table>';
}

function detailHTML(d){
  if(!d)return`<div class="pending"><b>TNM 待補</b>　目前僅提供版本資訊，完整 T/N/M 與 stage grouping 尚未填入。可請我補上這一章。</div>`;
  let h='';
  h+=tbl('T — 原發腫瘤',d.T);
  h+=tbl('N — 區域淋巴結',d.N);
  h+=tbl('M — 遠端轉移',d.M);
  if(d.S)h+=tbl('S — 血清標記',d.S);
  if(d.G)h+=tbl('G — 組織分級',d.G);
  h+=tbl('Stage Grouping — 分期分組',d.stage);
  if(d.note)h+=`<div class="note">${esc(d.note)}</div>`;
  return h;
}

function render(){
  const q=qEl.value.trim();
  let cur="",html="",n=0;
  DATA.forEach((d,idx)=>{
    if(fVer!=="all"&&d.ver!==fVer)return;
    if(fDetail&&!d.d)return;
    if(partSel.value!=="all"&&d.part!==partSel.value)return;
    if(q){
      const hay=(d.en+' '+d.zh+' '+d.part+' '+('ch'+d.ch)).toLowerCase();
      if(!hay.includes(q.toLowerCase()))return;
    }
    n++;
    if(d.part!==cur){cur=d.part;html+=`<div class="part">${esc(cur)}</div>`;}
    const badge=d.ver==="9"
      ? `<span class="badge b9">9e${d.y?' · '+d.y:''}</span>`
      : `<span class="badge b8">8e</span>`;
    const dflag=d.gen?'' : (d.d?'<span class="hasdetail">● 已填 TNM</span>':'<span class="nodetail">○ 待補</span>');
    html+=`<div class="card" data-i="${idx}">
      <div class="row">
        <span class="ch">${d.ch}</span>
        <span class="name"><span class="en">${hl(d.en,q)}</span> <span class="zh">${hl(d.zh,q)}</span> ${dflag}</span>
        ${badge}
        <span class="arrow">▶</span>
      </div>
      <div class="detail">${detailHTML(d.d)}</div>
    </div>`;
  });
  listEl.innerHTML=html||`<div class="empty">查無符合條件的項目</div>`;
  countEl.textContent=`顯示 ${n} / ${DATA.length} 章節　·　8e ${DATA.filter(x=>x.ver==='8').length} 章、9e ${DATA.filter(x=>x.ver==='9').length} 章`;
  // 綁定展開
  listEl.querySelectorAll('.card').forEach(c=>{
    c.querySelector('.row').onclick=()=>c.classList.toggle('open');
  });
}

qEl.oninput=render;
partSel.onchange=render;
document.querySelectorAll('.chip[data-ver]').forEach(ch=>{
  ch.onclick=()=>{
    document.querySelectorAll('.chip[data-ver]').forEach(x=>x.classList.remove('active'));
    ch.classList.add('active');fVer=ch.dataset.ver;render();
  };
});
document.querySelector('.chip[data-detail]').onclick=function(){
  fDetail=!fDetail;this.classList.toggle('active',fDetail);render();
};
render();
</script>
